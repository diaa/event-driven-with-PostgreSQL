version: "3.9"

services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres-wal2json/Dockerfile
    container_name: edp-postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - max_slot_wal_keep_size=2GB

  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: edp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: edp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: edp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: edp-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  connect:
    image: debezium/connect:2.7
    container_name: edp-connect
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      ENABLE_DEBEZIUM_SCRIPTING: "true"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: edp-postgres-exporter
    depends_on:
      - postgres
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/appdb?sslmode=disable

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: edp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - postgres-exporter

  grafana:
    image: grafana/grafana:11.0.0
    container_name: edp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards

  benchmark-dashboard:
    build:
      context: ./apps/benchmark-dashboard
    container_name: edp-benchmark-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./benchmarks/results:/app/results
    depends_on:
      - postgres

  wal2json-consumer:
    build:
      context: ./cdc/wal2json-consumer
    container_name: edp-wal2json-consumer
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DB: appdb
      SLOT_NAME: wal2json_slot
    depends_on:
      - postgres
    profiles:
      - consumers

  debezium-consumer:
    build:
      context: ./cdc/debezium-kafka
    container_name: edp-debezium-consumer
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: dbserver1.public.orders
      KAFKA_GROUP: benchmark-debezium-consumer
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DB: appdb
    depends_on:
      - kafka
      - connect
      - postgres
    profiles:
      - consumers

  drasi-sink:
    build:
      context: ./cdc/drasi
    container_name: edp-drasi-sink
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DB: appdb
    ports:
      - "8090:8090"
    depends_on:
      - postgres
    profiles:
      - drasi

volumes:
  pgdata:
